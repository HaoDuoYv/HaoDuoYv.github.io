<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资源导航</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo"><i data-lucide="bookmark" class="logo-icon"></i> 资源导航</div>
      <div class="search-box">
        <i data-lucide="search" class="search-icon-svg"></i>
        <input type="text" id="searchInput" placeholder="搜索资源...">
      </div>
      <div class="theme-dropdown" id="themeDropdown">
        <button class="theme-btn" id="themeBtn" title="切换主题"><i data-lucide="sun" id="themeIcon"></i></button>
        <div class="theme-menu" id="themeMenu">
          <button class="theme-option" data-theme="light" title="浅色模式"><i data-lucide="sun"></i></button>
          <button class="theme-option" data-theme="dark" title="深色模式"><i data-lucide="moon"></i></button>
          <button class="theme-option" data-theme="system" title="跟随系统"><i data-lucide="monitor"></i></button>
        </div>
      </div>
      <div class="clock" id="clock"></div>
    </div>
  </header>

  <div class="quote-banner" id="quoteBanner">
    <span class="quote-text" id="quoteText"></span>
    <span class="quote-cursor">|</span>
  </div>

  <main class="main" id="mainContent">
    <!-- JS 动态渲染 -->
  </main>

  <footer class="footer" id="footer"></footer>

  <!-- 详细说明弹窗 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-body" id="modalBody"></div>
      <a class="modal-btn" id="modalBtn" href="#" target="_blank" rel="noopener noreferrer">前往资源 →</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <script src="js/quote.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
